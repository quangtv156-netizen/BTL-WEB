<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page - LearnHub</title>
  <link rel="stylesheet" href="../css/base/global.css">
</head>
<body>
  <div class="container">
    <h1>Trang Test / Debug</h1>
    <p>LocalStorage hiện tại:</p>
    <pre id="storageDump"></pre>

    <button onclick="localStorage.clear(); alert('Đã xóa toàn bộ localStorage!')">Reset toàn bộ dữ liệu</button>
  </div>

  <script>
    document.getElementById('storageDump').textContent = JSON.stringify(localStorage, null, 2);
  </script>
</body>
</html>
